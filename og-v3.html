<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .wrap {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #3A5EE8 0%, #4F6EF5 50%, #5A50F2 100%);
    display: flex; align-items: center;
    position: relative; overflow: hidden;
  }
  .wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  /* Big VS watermark right side */
  .vs-bg {
    position: absolute; right: -30px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Syne', 'Arial Black', sans-serif;
    font-size: 520px; font-weight: 800;
    letter-spacing: -0.07em; line-height: 1;
    color: rgba(255,255,255,0.07);
    pointer-events: none; user-select: none;
  }
  .sep {
    position: absolute; left: 340px; top: 70px; bottom: 70px;
    width: 1px; background: rgba(255,255,255,0.18); z-index: 1;
  }
  .left {
    width: 340px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  /* logo on blue bg — use screen blend: black transparent, blue+white shows */
  .logo-img {
    width: 130px; height: 130px; object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }
  .right {
    flex: 1; padding: 0 64px 0 16px;
    position: relative; z-index: 1;
  }
  .location {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); margin-bottom: 20px;
  }
  .brand {
    font-family: 'Syne', 'Arial Black', sans-serif;
    font-size: 88px; font-weight: 800;
    letter-spacing: -0.045em; line-height: 0.95;
    color: #fff; margin-bottom: 28px;
  }
  .tagline {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 21px; font-weight: 400;
    color: rgba(255,255,255,0.72); line-height: 1.55;
    margin-bottom: 36px;
  }
  .url {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="vs-bg">VS</div>
  <div class="sep"></div>
  <div class="left">
    <img src="logo.png" class="logo-img" alt="VisualSites">
  </div>
  <div class="right">
    <div class="location">North Wales · Gwynedd</div>
    <div class="brand">VisualSites</div>
    <div class="tagline">Bespoke web design for businesses<br>that want to stand out online.</div>
    <div class="url">visualsites.co.uk</div>
  </div>
</div>
</body>
</html>
