<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .wrap {
    width: 1200px; height: 630px;
    background: #F8F9FF;
    display: flex;
    position: relative;
  }
  .left {
    flex: 1; padding: 68px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; z-index: 1;
  }
  .top-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: #4F6EF5;
  }
  .main-text { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .big-name {
    font-family: 'Syne', 'Arial Black', sans-serif;
    font-size: 118px; font-weight: 800;
    letter-spacing: -0.055em; line-height: 0.88;
    color: #07080F;
  }
  .line-accent {
    width: 100%; height: 2px;
    background: linear-gradient(90deg, #4F6EF5 0%, rgba(79,110,245,0.08) 100%);
    margin: 28px 0;
  }
  .sub {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 18px; font-weight: 400;
    color: rgba(7,8,15,0.48); line-height: 1.65;
    max-width: 450px;
  }
  .url {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 13px; color: rgba(7,8,15,0.28);
  }
  /* Right dark panel */
  .right {
    width: 310px; flex-shrink: 0;
    background: #07080F;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; position: relative; overflow: hidden;
  }
  .right::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 40%, rgba(79,110,245,0.24) 0%, transparent 65%);
  }
  /* logo inverted to white on dark bg */
  .logo-img {
    width: 110px; height: 110px; object-fit: contain;
    filter: brightness(0) invert(1);
    position: relative; z-index: 1; opacity: 0.9;
  }
  .location-tag {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-align: center; position: relative; z-index: 1;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="top-label">Web Design · Development · SEO</div>
    <div class="main-text">
      <div class="big-name">Visual<br>Sites</div>
      <div class="line-accent"></div>
      <div class="sub">Handcoded websites built around your business. No subscriptions. You own the code forever.</div>
    </div>
    <div class="url">visualsites.co.uk</div>
  </div>
  <div class="right">
    <img src="logo.png" class="logo-img" alt="VisualSites">
    <div class="location-tag">North Wales<br>Gwynedd</div>
  </div>
</div>
</body>
</html>
